{% extends "base.html" %}
{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">

    <div class="auth-header">
      <h1 class="auth-title">Add Expense</h1>
      <p class="auth-subtitle">
        <a href="{{ url_for('expenses') }}" style="color: var(--accent)">← Back to Expenses</a>
      </p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('add_expense') }}">

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" name="amount" class="form-input"
                 step="0.01" min="0.01" required
                 value="{{ amount or '' }}" placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input" required>
            <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" class="form-input"
                 required value="{{ date or today }}">
        </div>

        <div class="form-group">
          <label for="description">Description <span style="color: var(--ink-faint); font-weight: 400">(optional)</span></label>
          <input type="text" id="description" name="description" class="form-input"
                 maxlength="255" value="{{ description or '' }}"
                 placeholder="e.g. Lunch at canteen">
        </div>

        <button type="submit" class="btn-submit">Add Expense</button>
      </form>
    </div>

  </div>
</section>
{% endblock %}
